apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: default
  annotations:
    # Use the NGINX Ingress Controller
    kubernetes.io/ingress.class: nginx
    # Force HTTPS redirect in production
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # NGINX configuration for SPA routing fallback
    nginx.ingress.kubernetes.io/configuration-snippet: |
      try_files $uri $uri/ /index.html;
    # Uncomment below if using cert-manager for automated TLS
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # TLS configuration (uncomment and replace when domain is connected)
  # tls:
  #   - hosts:
  #       - portfolio.lalitpunjabi.com
  #     secretName: portfolio-tls-secret
  rules:
    - host: portfolio.local # Replace with your actual domain when deploying
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portfolio-service
                port:
                  number: 80
