version: '3.8'

services:
  portfolio-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: lalitpunjabi/devops-portfolio:latest
    container_name: devops-portfolio-ui
    restart: unless-stopped
    ports:
      - "8080:80" # Maps host port 8080 to container port 80
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production
