name: Docker Build & Container Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-validate:
    name: Build Docker Image & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the Docker image utilizing GitHub Actions Cache for faster subsequent builds
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false # Set to true later if pushing to Docker Hub / ECR
          tags: lalitpunjabi/devops-portfolio:latest
          load: true # Load the image into the local Docker daemon for testing
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run the container and verify health
      - name: Validate Container Runtime Health
        run: |
          # Start the container
          docker run -d -p 8080:80 --name test-portfolio lalitpunjabi/devops-portfolio:latest
          
          # Wait for Nginx to start
          sleep 5
          
          # Check if the site is returning HTTP 200
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" http://localhost:8080)
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Container health check PASSED. HTTP Status: $HTTP_STATUS"
          else
            echo "Container health check FAILED. HTTP Status: $HTTP_STATUS"
            docker logs test-portfolio
            exit 1
          fi
          
          # Cleanup
          docker stop test-portfolio
          docker rm test-portfolio
